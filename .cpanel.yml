---
# .cpanel.yml — Deployment configuration for cPanel Git™ Version Control
# This file must be in the ROOT of the repo (committed to GitHub)

deployment:
  tasks:
    # cPanel username: austvrud (document root)
    - export DEPLOYPATH=/home/austvrud/public_html/

    # Install deps and build the static site (Next.js export)
    # This allows deploying from source without committing the built 'out/' folder.
    - npm ci
    - npm run build

    # Secure deploy: preserve existing .htaccess and important files.
    # Only remove generated static files if needed. Using find for safety.
    - find $DEPLOYPATH -mindepth 1 ! -name '.htaccess' ! -name '.well-known' -delete 2>/dev/null || true

    # Deploy the built static files.
    - /bin/cp -R out/* $DEPLOYPATH

    # Ensure .htaccess is in place for security headers and routing.
    - /bin/cp -f .htaccess $DEPLOYPATH 2>/dev/null || true

