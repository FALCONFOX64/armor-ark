name: Deploy to cPanel (austinzierke.com)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # Allows manual run from GitHub UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Prepare static files (include .htaccess for security/caching)
        run: |
          cp .htaccess out/ 2>/dev/null || true
          # Clean any dev files if present in out
          rm -f out/.env* out/package*.json 2>/dev/null || true

      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ftp.austinzierke.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./out/
          server-dir: public_html/
          exclude: |
            **/.* 
            **/*.map
            **/LICENSE*
            **/*.LICENSE
          # Use delete: true to remove files on server that no longer exist locally
          # delete: true
          # dangerous-clean-slate: false   # Use with extreme caution - wipes target dir first

